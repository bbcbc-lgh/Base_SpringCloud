server:
  port: 8006

spring:
  application:
    name: auth-service
  config:
    import: optional:nacos:${spring.application.name}.yml?group=DEFAULT_GROUP
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        client-ip: ${SENTINEL_CLIENT_IP:127.0.0.1}
        port: 8721
  # SkyWalking Agent配置（通过JVM参数启动时添加）
  # -javaagent:/path/to/skywalking-agent.jar
  # -Dskywalking.agent.service_name=${spring.application.name}
  # -Dskywalking.collector.backend_service=${SKYWALKING_ADDR:127.0.0.1:11800}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${USER_DB_NAME:springcloud_user}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3s
  autoconfigure:
    exclude:
      - io.seata.spring.boot.autoconfigure.SeataAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataCoreAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataDataSourceAutoConfiguration
      - io.seata.spring.boot.autoconfigure.SeataGlobalTransactionAutoConfiguration

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

hystrix:
  command:
    default:
      execution:
        timeout:
          enabled: true
        isolation:
          thread:
            timeoutInMilliseconds: 10000
      circuitBreaker:
        enabled: true
        requestVolumeThreshold: 20
        sleepWindowInMilliseconds: 5000
        errorThresholdPercentage: 50
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  security:
    secret: ${APP_TOKEN_SECRET:gzu-demo-secret}
    ttl-minutes: 120
    public-path-prefixes:
      - /auth/login
      - /auth/register
      - /actuator
      - /error
